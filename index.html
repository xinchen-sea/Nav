<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="尘心的轻首页：搜索、常用入口、今日待办和临时记录。"
    />
    <title>尘心 · 轻首页</title>
    <link rel="icon" type="image/png" href="./assets/ico.png" />
    <link rel="apple-touch-icon" href="./assets/ico2.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body data-variant="scheme2-refined">
    <main class="shell" aria-label="尘心轻首页">
      <header class="topbar">
        <section class="identity" aria-labelledby="greeting">
          <img class="avatar" src="./assets/ico2.png" alt="尘心头像" />
          <div class="identity-copy">
            <h1 id="greeting">晚上好，尘心</h1>
            <p class="motto">
              <span id="mottoText"></span>
              <span class="cursor" aria-hidden="true"></span>
            </p>
          </div>
        </section>

        <section class="status-panel" aria-label="当前时间">
          <time id="clock" class="clock" datetime="">00:00</time>
          <time id="date" class="date" datetime="">正在载入日期</time>
          <span class="online-state"><span class="status-dot"></span>ONLINE</span>
        </section>
      </header>

      <section class="command-area" aria-label="搜索与入口">
        <form id="searchForm" class="command-shell" autocomplete="off">
          <span class="prompt" aria-hidden="true">&gt;</span>
          <input
            id="searchInput"
            type="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="搜索、输入网址或直接打开常用入口"
            aria-label="搜索、输入网址或打开常用入口"
          />
          <select id="engineSelect" aria-label="搜索引擎">
            <option value="bing">Bing</option>
            <option value="baidu">百度</option>
            <option value="google">Google</option>
            <option value="github">GitHub</option>
            <option value="youtube">YouTube</option>
            <option value="bilibili">Bilibili</option>
          </select>
          <button type="submit" aria-label="执行" title="执行">↵</button>
        </form>
      </section>

      <section class="workspace-grid" aria-label="今日工作台">
        <article class="card tasks-card">
          <div class="card-heading">
            <div>
              <span class="card-kicker"># today</span>
              <h2>今日待办</h2>
            </div>
            <span id="taskProgress">0/0 已完成</span>
          </div>
          <ul id="taskList" class="task-list"></ul>
          <form id="taskForm" class="task-form" autocomplete="off">
            <input
              id="taskInput"
              type="text"
              maxlength="72"
              placeholder="添加今天的一个小目标"
              aria-label="添加待办"
            />
            <button type="submit" aria-label="添加待办" title="添加">+</button>
          </form>
        </article>

        <article class="card note-card">
          <div class="card-heading">
            <div>
              <span class="card-kicker">~/quick-note</span>
              <h2>临时记录</h2>
            </div>
            <span id="noteStatus">已自动保存</span>
          </div>
          <textarea
            id="quickNote"
            spellcheck="false"
            placeholder="先把想法放在这里。"
            aria-label="临时记录"
          ></textarea>
          <div class="note-actions">
            <span id="noteMeta">0 字 · local only</span>
            <button id="copyNote" type="button" aria-label="复制记录" title="复制">复制</button>
            <button id="clearNote" type="button" aria-label="清空记录" title="清空">清空</button>
          </div>
        </article>
      </section>

      <section class="card site-section" aria-labelledby="siteTitle">
        <div class="card-heading">
          <div>
            <span class="card-kicker">~/frequent</span>
            <h2 id="siteTitle">常用网站</h2>
          </div>
          <span><span id="siteCount">0</span> / <span id="siteTotal">0</span> entries</span>
        </div>
        <div id="linkTabs" class="link-tabs" role="tablist" aria-label="常用网站分组"></div>
        <div id="linkGrid" class="link-groups"></div>
        <p id="emptyState" class="empty-state" hidden>没有匹配入口</p>
      </section>
    </main>
  </body>
</html>
